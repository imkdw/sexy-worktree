name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.6.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}."
            echo "Use tag ${EXPECTED_TAG} or update package.json before releasing."
            exit 1
          fi

      - name: Package macOS DMG
        run: pnpm dist:mac

      - name: List packaged artifacts
        run: ls -lh dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: sexy-worktree-macos-${{ github.run_number }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.dmg --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.dmg \
              --title "Sexy Worktree ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
