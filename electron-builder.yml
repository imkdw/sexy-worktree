appId: com.imkdw.sexy-worktree
productName: Sexy Worktree
directories:
  output: dist
files:
  - out/**
  - package.json
asar: true
asarUnpack:
  - node_modules/@anthropic-ai/claude-code/bin/**
  - node_modules/better-sqlite3/**/*.node
  - node_modules/node-pty/**/*.node
npmRebuild: true
mac:
  category: public.app-category.developer-tools
  identity: "-"
  target:
    - target: dmg
      arch:
        - arm64
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
